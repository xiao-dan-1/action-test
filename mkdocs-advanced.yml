site_name: Xiaodan's Lab
site_url: https://xiao-dan-1.github.io/action-test/
theme:
  name: material
  features:
    - content.code.copy          # 开启代码块一键复制原生特性
  palette:
    - scheme: default            # 日间模式配置
      primary: indigo
      toggle:
        icon: material/brightness-7
        name: 切换到夜间模式
    - scheme: slate              # 夜间模式配置
      primary: indigo
      toggle:
        icon: material/brightness-4
        name: 切换到日间模式

markdown_extensions:
  - admonition                   # 开启高级警告提示框
  - pymdownx.details             # 开启折叠框支持 (替代错误的 snippets)
  - pymdownx.superfences         # 支持高级代码块与嵌套
  - pymdownx.highlight:          # 代码高亮引擎
      anchor_linenums: true
      linenums: true
  - pymdownx.tasklist:           # 任务清单
      custom_checkbox: true
  - pymdownx.tilde:              # 波浪号解析（删除线/下标）
      smart_delete: false        # 关闭英文边界检测，兼容中文环境

plugins:
  - search                       # 显式保留全局搜索
  - git-revision-date-localized: # 注入 Git 提交时间戳
      type: timeago
